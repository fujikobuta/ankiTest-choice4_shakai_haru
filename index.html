<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Choice4 Test App</title>
    <!-- Google Fonts: M PLUS Rounded 1c -->
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700&display=swap" rel="stylesheet">
    <!-- SheetJS (xlsx.js) CDN -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        :root {
            --primary-bg: #fffbf0;
            --accent-color: #ff9800;
            --text-color: #4a4a4a;
            --maru-color: #4caf50;
            --batsu-color: #f44336;
            --back-color: #9e9e9e;
            --btn-shadow: 0 4px 0 #e68a00;
            --maru-shadow: 0 4px 0 #388e3c;
            --batsu-shadow: 0 4px 0 #d32f2f;
            --back-shadow: 0 4px 0 #757575;
        }

        body {
            font-family: 'M PLUS Rounded 1c', sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            box-sizing: border-box;
            user-select: none;
        }

        h1 {
            color: var(--accent-color);
            margin: 10px 0;
            font-size: 1.5rem;
        }

        .screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            width: 100%;
            height: 100%;
            padding: 15px;
            box-sizing: border-box;
            text-align: center;
        }

        .screen.active {
            display: flex;
        }

        /* Screen 1: Upload */
        #screen-upload {
            justify-content: center;
        }
        #upload-btn-label {
            background: white;
            border: 3px dashed var(--accent-color);
            padding: 40px 20px;
            border-radius: 20px;
            cursor: pointer;
            width: 80%;
            max-width: 400px;
            font-size: 1.2rem;
            color: var(--accent-color);
            font-weight: bold;
        }

        input[type="file"] {
            display: none;
        }

        /* Screen 2: Quiz */
        #progress {
            font-size: 1.1rem;
            margin-bottom: 10px;
            color: #888;
        }

        #question-box {
            background: white;
            width: 95%;
            max-width: 500px;
            min-height: 120px;
            border-radius: 20px;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
            margin-bottom: 10px;
            border: 3px solid #f0f0f0;
            position: relative;
        }

        #answer-box {
            background: #e3f2fd;
            width: 95%;
            max-width: 500px;
            min-height: 60px;
            border-radius: 15px;
            display: none; /* 初期は非表示 */
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            font-weight: bold;
            color: #1976d2;
            margin: 10px 0;
            padding: 10px;
            box-sizing: border-box;
            border: 2px solid #bbdefb;
        }

        #question-text {
            font-size: 1.8rem;
            font-weight: bold;
            line-height: 1.4;
            word-break: normal;
            overflow-wrap: anywhere;
        }

        /* 4択ボタンコンテナ */
        #choice-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            width: 95%;
            max-width: 500px;
            margin-bottom: 20px;
        }

        .choice-btn {
            background: white;
            border: 3px solid #eee;
            border-bottom: 6px solid #ddd;
            border-radius: 15px;
            padding: 15px 10px;
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--text-color);
            cursor: pointer;
            font-family: inherit;
            transition: all 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 80px;
            word-break: break-all;
        }

        .choice-btn:active {
            transform: translateY(3px);
            border-bottom-width: 3px;
        }

        .choice-btn.correct {
            background-color: var(--maru-color);
            color: white;
            border-color: #388e3c;
            border-bottom-color: #2e7d32;
        }

        .choice-btn.incorrect {
            background-color: var(--batsu-color);
            color: white;
            border-color: #d32f2f;
            border-bottom-color: #c62828;
        }

        .choice-btn.practice-hint {
            border-color: var(--maru-color);
            border-width: 5px;
            box-shadow: 0 0 10px rgba(76, 175, 80, 0.5);
        }

        .choice-btn.disabled {
            pointer-events: none;
            opacity: 0.8;
        }

        /* 修正待ち状態のボタン制御 */
        .choice-btn.waiting-correct {
            pointer-events: auto; /* 正解ボタンだけクリック可能にする */
        }

        /* 判定オーバーレイ */
        #judge-overlay {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 15rem;
            font-weight: bold;
            z-index: 100;
            pointer-events: none;
            opacity: 0;
            display: none;
        }

        #judge-overlay.maru {
            color: var(--maru-color);
            display: block;
            animation: popIn 0.6s forwards;
        }

        #judge-overlay.batsu {
            color: var(--batsu-color);
            display: block;
            animation: popIn 0.6s forwards;
        }

        @keyframes popIn {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            50% { transform: translate(-50%, -50%) scale(1.2); opacity: 0.8; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 0; }
        }

        .big-btn {
            padding: 15px 40px;
            font-size: 1.5rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.1s;
            width: 100%;
            background-color: var(--accent-color);
            color: white;
            box-shadow: var(--btn-shadow);
            height: 70px;
            margin-bottom: 20px;
        }
        .big-btn:active { transform: translateY(4px); }

        .judge-btn-big {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: none;
            font-size: 3rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
            box-shadow: 0 6px 0 rgba(0,0,0,0.1);
            transition: transform 0.1s;
        }
        .judge-btn-big:active { transform: translateY(4px); }
        .judge-btn-big.maru { background-color: var(--maru-color); box-shadow: 0 6px 0 #388e3c; }
        .judge-btn-big.batsu { background-color: var(--batsu-color); box-shadow: 0 6px 0 #d32f2f; }

        .secondary-btn {
            background: none;
            border: none;
            color: #888;
            font-size: 1rem;
            text-decoration: underline;
            cursor: pointer;
            padding: 10px;
            margin-top: 10px;
        }

        /* Screen 3: Result */
        #result-area {
            width: 100%;
            flex-grow: 1;
            background: white;
            margin: 15px 0;
            padding: 15px;
            border-radius: 15px;
            overflow-y: auto;
            text-align: left;
            font-family: monospace;
            white-space: pre-wrap;
            border: 1px solid #ddd;
            font-size: 1.1rem;
        }

        .bottom-nav {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
        }

        #line-btn {
            background-color: #06c755;
            color: white;
            width: 100%;
            height: 60px;
            border: none;
            border-radius: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            box-shadow: 0 4px 0 #05a546;
        }

        /* Resume Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal {
            background: white;
            padding: 30px;
            border-radius: 20px;
            width: 80%;
            max-width: 400px;
            text-align: center;
        }

        .modal-btns {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .modal-btn {
            flex: 1;
            padding: 15px;
            border-radius: 10px;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }

        #resume-yes {
            background: var(--accent-color);
            color: white;
        }

        #resume-no {
            background: #eee;
            color: #444;
        }
    </style>
</head>

<body>

    <div id="judge-overlay">○</div>

    <!-- Screen 1: File Selection -->
    <div id="screen-upload" class="screen active">
        <h1>Choice4 Test App</h1>
        <p>Excelファイルをえらんでね！</p>
        <p style="font-size: 0.8rem; color: #888;">「予定表」シートを読み込みます</p>
        <label id="upload-btn-label" for="file-input">
            📄 ファイルをアップロード
        </label>
        <input type="file" id="file-input" accept=".xlsx">
    </div>

    <!-- Screen 2: Quiz -->
    <div id="screen-quiz" class="screen">
        <div id="progress">0 / 0</div>
        <div id="question-box">
            <div id="question-text">読み込み中...</div>
        </div>
        <div id="answer-box"></div>

        <div id="choice-container">
            <!-- Buttons generated by JS -->
        </div>

        <!-- 自己採点モード用 UI -->
        <div id="self-grade-container" style="display: none; width: 100%; max-width: 500px; flex-direction: column; align-items: center;">
            <button id="check-ans-btn" class="big-btn">答えを確認</button>
            <div id="self-judge-btns" style="display: none; gap: 40px; justify-content: center; width: 100%;">
                <button id="self-maru-btn" class="judge-btn-big maru">○</button>
                <button id="self-batsu-btn" class="judge-btn-big batsu">×</button>
            </div>
            <!-- 不正解時の修正ステップ用 -->
            <button id="self-correct-btn" class="choice-btn correct waiting-correct" style="display: none; width: 100%; max-width: 300px; margin: 0 auto; height: 80px;"></button>
        </div>

        <button id="back-btn" class="secondary-btn" style="display: none;">◀ ひとつ前にもどる</button>
    </div>

    <!-- Screen 3: Result -->
    <div id="screen-result" class="screen">
        <h1>テストおつかれさま！</h1>
        <div id="result-area"></div>
        <div class="bottom-nav">
            <button id="line-btn">結果をコピーしてLINEで送る</button>
            <button id="restart-btn" class="secondary-btn" style="width: 100%;">最初からやりなおす</button>
        </div>
    </div>

    <!-- Resume Modal -->
    <div id="resume-modal" class="modal-overlay">
        <div class="modal">
            <h3>前回のつづきがあるよ！</h3>
            <p>とちゅうから はじめる？</p>
            <div class="modal-btns">
                <button id="resume-no" class="modal-btn">最初から</button>
                <button id="resume-yes" class="modal-btn">つづきから</button>
            </div>
        </div>
    </div>

    <script>
        // QUESTIONS_DATA_START
        const embeddedQuestions = [{"q": "牛肉の輸入相手国　①位　②位", "n": 1, "a": "①オーストラリア②アメリカ", "t": "", "choices": [], "practice": true, "p": 1}, {"q": "鶏肉の輸入相手国　①位　②位", "n": 2, "a": "①ブラジル②タイ", "t": "", "choices": [], "practice": true, "p": 1}, {"q": "生産量＞ブロイラー（肉用若鶏）　①位　②位　③位", "n": 3, "a": "①鹿児島②宮崎③岩手", "t": "", "choices": [], "practice": true, "p": 1}, {"q": "愛知県の用水3つを西から順に〇、〇、〇", "n": 4, "a": "愛知用水、明治用水、豊川用水", "t": "", "choices": [], "practice": true, "p": 1}, {"q": "農業＞暗きょ排水により湿田から乾田になった代表的な平野は？", "n": 5, "a": "越後平野", "t": "", "choices": [], "practice": true, "p": 1}, {"q": "琵琶湖の下側の〇〇盆地では、稲作が盛んです。", "n": 6, "a": "近江盆地", "t": "", "choices": [], "practice": false, "p": 1}, {"q": "米作り＞冷害により夏に気温が上がらず凶作となることがある。東北地方太平洋側では主に〇〇が原因になる。", "n": 7, "a": "やませ", "t": "", "choices": [], "practice": false, "p": 1}, {"q": "米作り＞1995年から〇〇を導入し、一定量の米を輸入できるようになった。1999年には輸入自由化がされた。", "n": 8, "a": "ミニマムアクセス", "t": "", "choices": [], "practice": false, "p": 1}, {"q": "連作障害を防ぐため輪作している代表的な平野は？ヒント北海道！", "n": 9, "a": "十勝平野", "t": "", "choices": [], "practice": false, "p": 1}, {"q": "農業＞耕地整理とは何 のことでしょう？", "n": 10, "a": "耕地をまっすぐにして大型の農業機械を使いやすくする工夫のこと", "t": "", "choices": [], "practice": false, "p": 1}, {"q": "農業＞主に農業の収入で生計をたてている農家を〇〇農家という", "n": 11, "a": "専業農家", "t": "", "choices": [], "practice": false, "p": 1}, {"q": "農業＞農業以外の仕事での収入がある農家を〇〇農家という", "n": 12, "a": "兼業農家", "t": "", "choices": [], "practice": false, "p": 1}, {"q": "農業＞豊作貧乏とは何のことでしょう？", "n": 13, "a": "作物が取れすぎることで大幅に値下がりしてしまいかえって農家が損をすること", "t": "", "choices": [], "practice": false, "p": 1}, {"q": "農業＞ある農産物の輸入が増えすぎてやばいとき、輸入制限をかけることができる制度をなんという？", "n": 14, "a": "セーフガード", "t": "", "choices": [], "practice": false, "p": 1}, {"q": "農業＞輸入制限をかけれるセーフガードは、貿易に関する国際機関である〇〇（世界貿易機関）の協定によって認められている", "n": 15, "a": "WTO", "t": "", "choices": [], "practice": false, "p": 1}, {"q": "農業＞東日本大震災のときはどんな風評被害がおきた？", "n": 16, "a": "原発の影響で作物が汚染されているという風評被害により福島近辺の農産物等が売れなくなった", "t": "", "choices": [], "practice": false, "p": 1}, {"q": "農業＞関税をなくし自由貿易を進める多国間協定をアルファベットでなんという？", "n": 17, "a": "TPP11※最近はイギリスが入って12になった（環太平洋経済連携協定11）", "t": "", "choices": [], "practice": false, "p": 1}, {"q": "林業＞木材の自給率は不景気で家が建てられないことなどから低下していたが、じょじょに回復し、現在は約〇％です。", "n": 18, "a": "40％", "t": "", "choices": [], "practice": false, "p": 1}, {"q": "林業＞木材ができるまでの流れを並べ替えて→（下草刈り　伐採　枝打ち　苗木づくり　搬出　植林　間伐）", "n": 19, "a": "苗木づくり→植林→下草刈り→枝打ち→間伐→伐採→搬出", "t": "", "choices": [], "practice": false, "p": 1}, {"q": "林業＞育ちの悪い木を切る工程をなんという？", "n": 20, "a": "間伐", "t": "", "choices": [], "practice": false, "p": 1}, {"q": "林業＞成長が早くまっすぐなので木材にむいている針葉樹はどれ？（まつ、さくら、けやき、すぎ、ブナ、ひのき）", "n": 21, "a": "まつ、すぎ、ひのき", "t": "", "choices": [], "practice": false, "p": 1}, {"q": "林業＞曲がりながら生えるため木材に向かない広葉樹はどれ？（まつ、さくら、けやき、すぎ、ブナ、ひのき）", "n": 22, "a": "ブナ、けやき、さくら", "t": "", "choices": [], "practice": false, "p": 1}, {"q": "林業＞天然三大美林といえば？県名も答えましょう。", "n": 23, "a": "津軽ひば（青森）、秋田すぎ、木曽ひのき（長野）", "t": "", "choices": [], "practice": false, "p": 1}, {"q": "林業＞人工三大美林といえば？県名も答えましょう。", "n": 24, "a": "天竜すぎ（静岡）、尾鷲ひのき（三重）、吉野すぎ（奈良）", "t": "", "choices": [], "practice": false, "p": 1}, {"q": "林業＞木材の輸入相手国　カナダ、〇〇、ロシア、ベトナム、〇〇など", "n": 25, "a": "アメリカ、中国", "t": "", "choices": [], "practice": false, "p": 1}, {"q": "弥生（紀元前4～前3世紀頃）＞収穫した稲を蓄えておく①庫", "n": 26, "a": "高床倉庫 ※高い床の倉庫だよ", "t": "", "choices": [], "practice": false, "p": 1}, {"q": "室町＞1543（以後、予算がかかる）＞　〇〇", "n": 27, "a": "鉄砲伝来", "t": "", "choices": [], "practice": false, "p": 1}, {"q": "室町＞1549（以後、よく来る）＞　〇〇", "n": 28, "a": "キリスト教伝来", "t": "", "choices": [], "practice": false, "p": 1}, {"q": "江戸2＞天保改革で水野忠邦は株仲間を解散したが、その結果どうなった？", "n": 29, "a": "経済が混乱した", "t": "", "choices": [], "practice": false, "p": 1}, {"q": "江戸4＞黒船（ペリー）来航は何年？", "n": 30, "a": "1853年", "t": "", "choices": [], "practice": false, "p": 1}, {"q": "江戸4＞1854年＞日米和親条約でやむなく開港した港は？", "n": 31, "a": "下田（静岡）、函館", "t": "", "choices": [], "practice": false, "p": 1}, {"q": "江戸4＞1858年＞日米修好通商条約でやむなく開港した港は？", "n": 32, "a": "横浜、神戸、長崎、新潟　（下田は閉鎖）", "t": "", "choices": [], "practice": false, "p": 1}, {"q": "江戸4＞安政の大獄＞なぜ幕府を批判する人が増えたの？", "n": 33, "a": "アメリカなどと不平等条約を結んでしまったから", "t": "", "choices": [], "practice": false, "p": 1}, {"q": "江戸4＞安政の大獄で、幕府を批判する人々を処罰したのは誰？", "n": 34, "a": "井伊直弼", "t": "", "choices": [], "practice": false, "p": 1}, {"q": "江戸4＞江戸時代の終了（大政奉還）は西暦何年？", "n": 35, "a": "1867年", "t": "", "choices": [], "practice": false, "p": 1}, {"q": "昭和1＞ポツダムはどこの国？", "n": 36, "a": "ドイツ", "t": "", "choices": [], "practice": false, "p": 1}, {"q": "昭和2＞日本国憲法＞①公布した年月日は？②施行した年月日は？", "n": 37, "a": "①1946年11月3日　②1947 年 5 月 3 日　※公布 から半年間 、周知 させてからの施行", "t": "", "choices": [], "practice": false, "p": 1}, {"q": "昭和2＞1964年東海道新幹線が開通したが、どこからどこ？", "n": 38, "a": "東京ー新大阪", "t": "", "choices": [], "practice": false, "p": 1}, {"q": "公民4＞最高裁判所がある都道府県は？", "n": 39, "a": "東京", "t": "", "choices": [], "practice": false, "p": 1}, {"q": "公民4＞高等裁判所がある都道府県は？合計何か所？", "n": 40, "a": "札幌、仙台、東京、名古屋、大阪、広島、高松、福岡　※各地方に1つづつ計8つ", "t": "", "choices": [], "practice": false, "p": 1}, {"q": "公民7＞社会保険、公的扶助、社会福祉、公衆衛生、これらは○○の4本柱である", "n": 41, "a": "社会保障", "t": "", "choices": [], "practice": false, "p": 1}, {"q": "世界地図をざっくり書いて、大陸名を入れて。", "n": 42, "a": "★アジア ヨーロッパ アフリカ 北アメリカ 南アメリカ オーストラリア 南極", "t": "", "choices": [], "practice": false, "p": 1}, {"q": "常任理事国をすべて答えよ", "n": 43, "a": "アメリカ フランス ロシア 中国 イギリス", "t": "", "choices": [], "practice": false, "p": 1}];
        // QUESTIONS_DATA_END

        let questions = [];
        let currentIndex = 0;
        let results = [];
        let isJudging = false;
        let isWaitingForCorrection = false;

        const STORAGE_KEY = 'shakai_4taku_progress';

        const fileInput = document.getElementById('file-input');
        const screenUpload = document.getElementById('screen-upload');
        const screenQuiz = document.getElementById('screen-quiz');
        const screenResult = document.getElementById('screen-result');

        const questionText = document.getElementById('question-text');
        const answerBox = document.getElementById('answer-box');
        const choiceContainer = document.getElementById('choice-container');
        const selfGradeContainer = document.getElementById('self-grade-container');
        const selfJudgeBtns = document.getElementById('self-judge-btns');
        const checkAnsBtn = document.getElementById('check-ans-btn');
        const selfMaruBtn = document.getElementById('self-maru-btn');
        const selfBatsuBtn = document.getElementById('self-batsu-btn');
        const selfCorrectBtn = document.getElementById('self-correct-btn');
        const backBtn = document.getElementById('back-btn');
        const progressText = document.getElementById('progress');
        const resultArea = document.getElementById('result-area');
        const resumeModal = document.getElementById('resume-modal');
        const judgeOverlay = document.getElementById('judge-overlay');

        window.addEventListener('DOMContentLoaded', () => {
            if (typeof embeddedQuestions !== 'undefined' && embeddedQuestions && Array.isArray(embeddedQuestions) && embeddedQuestions.length > 0) {
                questions = embeddedQuestions;
                checkResume();
            }
        });

        function checkResume() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                try {
                    const progress = JSON.parse(saved);
                    if (progress.total === questions.length && progress.index > 0) {
                        resumeModal.style.display = 'flex';
                        document.getElementById('resume-yes').onclick = () => {
                            currentIndex = progress.index;
                            results = progress.results;
                            resumeModal.style.display = 'none';
                            startQuiz(false);
                        };
                        document.getElementById('resume-no').onclick = () => {
                            clearProgress();
                            resumeModal.style.display = 'none';
                            startQuiz(true);
                        };
                        return;
                    }
                } catch (e) {
                    clearProgress();
                }
            }
            startQuiz(true);
        }

        function saveProgress() {
            const state = { index: currentIndex, results: results, total: questions.length };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        }

        function clearProgress() {
            localStorage.removeItem(STORAGE_KEY);
        }

        function getColorPriority(cell) {
            if (!cell || !cell.s || !cell.s.fgColor || !cell.s.fgColor.rgb) return 5;
            let rgb = cell.s.fgColor.rgb;
            if (rgb.length > 6) rgb = rgb.slice(-6);
            if (rgb.length !== 6) return 5;
            let r = parseInt(rgb.substring(0, 2), 16), g = parseInt(rgb.substring(2, 4), 16), b = parseInt(rgb.substring(4, 6), 16);
            if (r >= 180 && g < 100 && b < 100) return 1;
            if (r >= 180 && g >= 180 && b < 100) return 2;
            if (g >= 150 && r < 150 && b < 150) return 3;
            if (b >= 150 && r < 150) return 4;
            return 5;
        }

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                const data = new Uint8Array(event.target.result);
                const workbook = XLSX.read(data, { type: 'array', cellStyles: true });
                const worksheet = workbook.Sheets["予定表"];
                if (!worksheet) { alert("「予定表」シートが見つかりませんでした。"); return; }
                const range = XLSX.utils.decode_range(worksheet['!ref']);
                let rawData = [];
                for (let r = range.s.r + 1; r <= range.e.r; r++) {
                    const cellI = worksheet[XLSX.utils.encode_cell({ r: r, c: 8 })], // Question
                        cellJ = worksheet[XLSX.utils.encode_cell({ r: r, c: 9 })],  // Number
                        cellK = worksheet[XLSX.utils.encode_cell({ r: r, c: 10 })], // Answer
                        cellL = worksheet[XLSX.utils.encode_cell({ r: r, c: 11 })], // Choices
                        cellM = worksheet[XLSX.utils.encode_cell({ r: r, c: 12 })], // Type
                        cellR = worksheet[XLSX.utils.encode_cell({ r: r, c: 17 })]; // Q_Value
                    
                    if (!cellI || !cellK) continue;
                    const q = cellI.v, a = cellK.v,
                        c_val = cellL ? String(cellL.v).trim() : "",
                        type_val = cellM ? String(cellM.v).trim() : "4択",
                        qVal = cellR ? cellR.v : null,
                        practice = (qVal !== null && String(qVal).trim() === "0");
                    
                    if (!cellJ || cellJ.v === undefined || cellJ.v === null) continue;
                    let num = parseInt(cellJ.v);
                    if (isNaN(num)) continue;
                    if (!q || !a || q === "問題文") continue;
                    
                    rawData.push({
                        q: q, n: num, a: a, t: type_val,
                        choices: c_val ? c_val.split(/[、\n]/).map(s => s.trim()).filter(s => s) : [],
                        practice: practice, p: getColorPriority(cellI)
                    });
                }
                questions = rawData.sort((a, b) => (a.p !== b.p) ? a.p - b.p : a.n - b.n);
                if (questions.length === 0) { alert("問題が見つかりませんでした。"); return; }
                startQuiz(true);
            };
            reader.readAsArrayBuffer(file);
        });

        function startQuiz(reset = true) {
            if (reset) { currentIndex = 0; results = []; clearProgress(); }
            screenUpload.classList.remove('active');
            screenQuiz.classList.add('active');
            showQuestion();
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function showQuestion() {
            if (!questions || questions.length === 0) return;
            isJudging = false;
            isWaitingForCorrection = false;
            const q = questions[currentIndex];
            progressText.innerText = `${currentIndex + 1} / ${questions.length}`;
            questionText.innerText = q.q;
            
            const len = q.q.length;
            questionText.style.fontSize = len < 15 ? "2.2rem" : len < 30 ? "1.6rem" : len < 60 ? "1.3rem" : "1.1rem";
            
            choiceContainer.innerHTML = "";
            backBtn.style.display = (currentIndex > 0) ? "block" : "none";
            answerBox.innerText = "";
            answerBox.style.display = "none";
            judgeOverlay.className = "";

            const isChoiceMode = (q.t === "4択");
            
            if (isChoiceMode) {
                // 4択モード
                choiceContainer.style.display = "grid";
                selfGradeContainer.style.display = "none";
                
                let displayChoices = [];
                if (q.choices && q.choices.length > 0) {
                    displayChoices = [...q.choices];
                    if (!displayChoices.includes(q.a)) displayChoices[0] = q.a;
                } else {
                    displayChoices = [q.a, "ダミー1", "ダミー2", "ダミー3"];
                }
                shuffleArray(displayChoices);

                displayChoices.forEach(choiceText => {
                    const btn = document.createElement('button');
                    btn.className = 'choice-btn';
                    if (q.practice && choiceText === q.a) btn.classList.add('practice-hint');
                    btn.innerText = choiceText;
                    btn.onclick = () => handleChoiceClick(choiceText, btn);
                    choiceContainer.appendChild(btn);
                });
            } else {
                // 自己採点モード（空欄または「4択」以外）
                choiceContainer.style.display = "none";
                selfGradeContainer.style.display = "flex";
                checkAnsBtn.style.display = "block";
                selfJudgeBtns.style.display = "none";
                selfCorrectBtn.style.display = "none";
                
                if (q.practice) {
                    answerBox.innerText = q.a;
                    answerBox.style.display = "flex";
                }
            }
        }

        checkAnsBtn.onclick = () => {
            const q = questions[currentIndex];
            answerBox.innerText = q.a;
            answerBox.style.display = "flex";
            checkAnsBtn.style.display = "none";
            selfJudgeBtns.style.display = "flex";
        };

        selfMaruBtn.onclick = () => {
            if (isJudging) return;
            isJudging = true;
            showJudgeOverlay(true);
            setTimeout(() => {
                recordResult('○');
            }, 800);
        };

        selfBatsuBtn.onclick = () => {
            if (isJudging) return;
            isJudging = true;
            showJudgeOverlay(false);
            setTimeout(() => {
                recordResult('×');
            }, 800);
        };

        selfCorrectBtn.onclick = () => {
            if (isWaitingForCorrection) {
                recordResult('×');
            }
        };

        function showJudgeOverlay(isCorrect) {
            judgeOverlay.innerText = isCorrect ? "○" : "×";
            judgeOverlay.className = isCorrect ? "maru" : "batsu";
        }

        function handleChoiceClick(selectedText, btn) {
            if (isJudging && !isWaitingForCorrection) return;
            
            const q = questions[currentIndex];
            const isCorrect = (selectedText === q.a);

            if (isWaitingForCorrection) {
                if (isCorrect) {
                    recordResult('×');
                    judgeOverlay.className = "";
                }
                return;
            }

            isJudging = true;

            const buttons = choiceContainer.querySelectorAll('.choice-btn');
            buttons.forEach(b => {
                b.classList.remove('practice-hint');
                b.classList.add('disabled');
                if (b.innerText === q.a) {
                    b.classList.add('correct');
                    if (!isCorrect) b.classList.add('waiting-correct');
                } else if (b === btn && !isCorrect) {
                    b.classList.add('incorrect');
                }
            });

            showJudgeOverlay(isCorrect);
            
            if (isCorrect) {
                setTimeout(() => {
                    recordResult('○');
                    judgeOverlay.className = "";
                }, 800);
            } else {
                isWaitingForCorrection = true;
            }
        }

        function recordResult(judge) {
            results.push({
                n: questions[currentIndex].n,
                p: questions[currentIndex].p,
                a: questions[currentIndex].a,
                j: judge
            });
            currentIndex++;
            saveProgress();
            if (currentIndex < questions.length) {
                showQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            clearProgress();
            screenQuiz.classList.remove('active');
            screenResult.classList.add('active');
            let text = "";
            results.forEach(res => {
                text += `${res.n} ${res.p} ${res.a} ${res.j}\n`;
            });
            resultArea.innerText = text;
        }

        backBtn.addEventListener('click', () => {
            if (currentIndex > 0) {
                currentIndex--;
                results.pop();
                saveProgress();
                showQuestion();
            }
        });

        document.getElementById('line-btn').addEventListener('click', () => {
            const text = resultArea.innerText;
            if (navigator.clipboard) {
                navigator.clipboard.writeText(text).then(() => openLine(text)).catch(() => fallbackCopy(text));
            } else {
                fallbackCopy(text);
            }
        });

        function fallbackCopy(text) {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            document.body.appendChild(textArea);
            textArea.select();
            try { document.execCommand('copy'); openLine(text); } catch (e) { alert("コピー失敗"); }
            document.body.removeChild(textArea);
        }

        function openLine(text) {
            window.location.href = `line://msg/text/${encodeURIComponent(text)}`;
            setTimeout(() => alert("結果をコピーしました！LINEに貼り付けて送ってください。"), 500);
        }

        document.getElementById('restart-btn').addEventListener('click', () => {
            if (confirm("最初から やりなおす？")) {
                screenResult.classList.remove('active');
                startQuiz(true);
            }
        });
    </script>
</body>
